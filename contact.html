<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - ShoeZone</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#ff4d4d,#ff9966);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CONTACT BOX */
.contact-container{
width:100%;
max-width:500px;
padding:20px;
}

.contact-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
}

/* TITLE */
.contact-box h1{
margin-bottom:25px;
font-size:40px;
color:#222;
}

/* INPUTS */
.contact-box input,
.contact-box textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#f2f2f2;
font-size:16px;
outline:none;
transition:.3s;
}

.contact-box input:focus,
.contact-box textarea:focus{
background:#fff;
box-shadow:0 0 10px rgba(255,77,77,0.3);
}

/* BUTTON */
.contact-box button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#ff4d4d;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.contact-box button:hover{
background:#e63c3c;
transform:translateY(-2px);
}

/* SOCIALS */
.social-links{
margin-top:20px;
}

.social-links a{
text-decoration:none;
margin:0 10px;
font-size:24px;
color:#ff4d4d;
}

.back-btn{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#555;
}

</style>

</head>

<body>

<div class="contact-container">

<div class="contact-box">

<h1>Contact Us 📞</h1>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">
Send Message
</button>

</form>

<div class="social-links">

<a href="#">📱</a> <a href="#">📧</a> <a href="#">📸</a>

</div>

<a href="index.html" class="back-btn">
⬅ Back to Home
</a>

</div>

</div>

</body>
</html>
